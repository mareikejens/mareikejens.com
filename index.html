/* ---------- APP ---------- */
const App = () => {
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [state, setState] = useState(TWEAK_DEFAULTS);
  const formRef = useRef(null);
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  useEffect(() => {document.documentElement.setAttribute('data-accent', state.accent);}, [state.accent]);
  const onChange = (key, val) => {
    const next = { ...state, [key]: val };
    setState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };
  const scrollToApply = () => { window.location.href = MAIL_URL; };
  return (
    <>
      <Nav onBook={scrollToApply} />
      <Hero onBook={scrollToApply} />
      <Credibility />
      <Offerings onBook={scrollToApply} />
      <Coaching onBook={scrollToApply} />
      <Academy />
      <Enterprise onBook={scrollToApply} />
      <About />
      <FAQ />
      <CTA formRef={formRef} />
      <Contact />
      <Imprint />
      <Footer />
      <TweaksPanel visible={tweaksVisible} state={state} onChange={onChange} />
    </>);

};
