<style>
  :root{
    --accent:#FF5B1F; --accent-ink:#FF5B1F;
    --bg:#F5F1EA; --surface:#FFFFFF;
    --ink:#0E0E0C; --ink-2:#2a2622; --muted:#736a60; --line:#E6DFD4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
  body{font-family:'Inter Tight', system-ui, sans-serif; -webkit-font-smoothing:antialiased;}
  .serif{font-family:'Instrument Serif', serif; font-weight:400; letter-spacing:-.01em;}
  .mono{font-family:'JetBrains Mono', ui-monospace, monospace; letter-spacing:.01em;}
  a{color:inherit;}
  main{max-width:720px; margin:0 auto; padding:80px 32px 120px;}
  .eyebrow{font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.18em; color:var(--muted); margin-bottom:14px;}
  h1{font-family:'Instrument Serif', serif; font-size:clamp(36px, 5vw, 56px); line-height:1; margin:0 0 28px; letter-spacing:-.02em; font-weight:400;}
  .body{font-size:16px; line-height:1.7; color:var(--ink-2);}
  .body a{color:var(--accent-ink);}
  .back{display:inline-flex; align-items:center; gap:8px; margin-top:48px; font-size:14px; color:var(--muted); text-decoration:none;}
  .back:hover{color:var(--ink);}
</style>
</head>
<body>
<main>
  <div class="eyebrow">Imprint</div>
  <h1>Imprint.</h1>
  <div class="body">

    <a href="mailto:mareike.jens@gmail.com">mareike.jens@gmail.com</a>
  </div>
  <a class="back" href="/">← Back to home</a>
</main>
</body>
</html>
